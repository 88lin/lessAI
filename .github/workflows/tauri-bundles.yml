name: Tauri Bundles

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  bundle:
    name: Bundle (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            rpm

          # WebKitGTK: Ubuntu 22.04 uses 4.0, newer versions use 4.1
          sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev

          # AppIndicator: some distros use ayatana naming
          sudo apt-get install -y libayatana-appindicator3-dev || sudo apt-get install -y libappindicator3-dev

          # AppImage runtime helpers (best-effort)
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64 || true

      - name: Install Windows bundlers
        if: matrix.os == 'windows-latest'
        run: |
          choco install nsis -y
          choco install wixtoolset -y

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build bundles
        env:
          RUST_BACKTRACE: "1"
        run: pnpm run tauri:build

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.os }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error

  release:
    name: Release (GitHub)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download bundles
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: bundles-*

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release-assets

          for dir in artifacts/bundles-*; do
            os="$(basename "$dir")"
            echo "[INFO] Collecting files from $os"

            while IFS= read -r -d '' file; do
              base="$(basename "$file")"
              cp "$file" "release-assets/${os}__${base}"
            done < <(
              find "$dir" -type f \
                \( \
                  -name "*.dmg" -o \
                  -name "*.pkg" -o \
                  -name "*.AppImage" -o \
                  -name "*.deb" -o \
                  -name "*.rpm" -o \
                  -name "*.msi" -o \
                  -name "*.exe" -o \
                  -name "*.zip" -o \
                  -name "*.tar.gz" \
                \) -print0
            )
          done

          if [ -z "$(ls -A release-assets)" ]; then
            echo "[ERROR] No bundle files were found under artifacts/." >&2
            echo "[HINT] Check Tauri output under src-tauri/target/release/bundle on each OS." >&2
            exit 1
          fi

          (cd release-assets && sha256sum * > checksums.sha256)

          echo "[INFO] Release assets:"
          ls -la release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
